<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SuperSac" />
<meta name="theme-color" content="#0f0f13" />
<title>Super Sac Auto — Assistente de Serviços</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.12);
    --text: #f0efe8;
    --text-muted: #8e8ea0;
    --green: #4caf82;
    --green-bg: rgba(76,175,130,0.12);
    --red: #e05c5c;
    --red-bg: rgba(224,92,92,0.12);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .brand-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .brand-sub { font-size: 11px; color: var(--text-muted); }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; padding: 5px 12px;
    border-radius: 20px; border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .status-pill.ok { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .status-pill.err { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* MAIN */
  main { flex: 1; display: flex; flex-direction: column; max-width: 720px; width: 100%; margin: 0 auto; padding: 20px 16px; gap: 16px; }

  /* PILLS */
  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    font-size: 12px; padding: 6px 13px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-muted); cursor: pointer; transition: all 0.15s;
    user-select: none;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* CHAT */
  .chat-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 400px;
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
  }
  .msg.assistant .avatar { background: var(--accent); color: #1a1200; }
  .msg.user .avatar { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

  .bubble {
    padding: 10px 15px; border-radius: 14px;
    font-size: 14px; line-height: 1.6; max-width: 82%;
  }
  .msg.assistant .bubble {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--accent); color: #1a1200;
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  /* typing */
  .typing-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted); margin: 0 2px;
    animation: blink 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

  /* INPUT */
  .input-area {
    display: flex; gap: 10px; padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .input-area input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 24px; padding: 10px 18px;
    font-size: 14px; color: var(--text); font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  .input-area input:focus { border-color: var(--accent); }
  .input-area input::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: #1a1200; }

  /* reload */
  .reload-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    font-size: 12px; padding: 5px 12px; border-radius: 20px; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .reload-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* AI response styles */
  .r-specific { display: flex; flex-direction: column; gap: 4px; }
  .r-yn { font-size: 16px; font-weight: 500; }
  .r-yn.yes { color: var(--color-text-success); }
  .r-yn.no { color: var(--color-text-danger); }
  .r-detail { font-size: 13px; color: var(--color-text-secondary); }
  .r-table { display: flex; flex-direction: column; gap: 10px; }
  .r-car { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); }
  .r-table table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .r-table th { text-align: left; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-secondary); padding: 5px 6px; border-bottom: 0.5px solid var(--color-border-secondary); }
  .r-table td { padding: 7px 6px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); vertical-align: top; }
  .r-table tr:last-child td { border-bottom: none; }
  .r-total { font-size: 13px; font-weight: 500; text-align: right; padding-top: 6px; border-top: 0.5px solid var(--color-border-secondary); }
  .r-list { padding-left: 1.2rem; font-size: 14px; line-height: 2; }
  .r-highlight { background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 8px; padding: 6px 10px !important; color: var(--accent) !important; font-weight: 500; margin-top: 4px; }
  .r-summary { margin-top: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; }
  .r-summary-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px; }
  .r-summary-grid { display: flex; flex-direction: column; gap: 0; }
  .r-summary-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .r-summary-item:last-child { border-bottom: none; }
  .r-summary-cat { flex: 1; color: var(--text); font-weight: 500; }
  .r-summary-count { font-size: 12px; color: var(--text-muted); min-width: 50px; text-align: right; }
  .r-summary-val { min-width: 80px; text-align: right; color: var(--text); font-weight: 500; }

  .r-table .r-group-header td { background: var(--surface2); color: var(--accent); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; padding: 6px 8px; border-bottom: 0.5px solid var(--border); border-top: 0.5px solid var(--border); }
  .r-analysis { margin-top: 12px; background: var(--surface2); border: 1px solid var(--accent); border-radius: 12px; padding: 1rem 1.25rem; }
  .r-analysis-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 8px; }
  .r-analysis-body { font-size: 13px; line-height: 1.7; color: var(--text-muted); }

  @media (max-width: 600px) {
    header { padding: 10px 14px; }
    .brand-name { font-size: 13px; }
    .brand-sub { display: none; }
    .brand-icon { width: 28px; height: 28px; font-size: 14px; }
    main { padding: 10px; gap: 10px; }
    .pills { gap: 6px; }
    .pill { font-size: 11px; padding: 5px 10px; }
    .chat-box { min-height: 300px; }
    .messages { max-height: calc(100vh - 220px); padding: 12px; }
    .bubble { font-size: 13px; padding: 7px 11px; max-width: 90%; }
    .avatar { width: 24px; height: 24px; font-size: 10px; }
    .input-area { padding: 8px 10px; gap: 8px; }
    .input-area input { font-size: 16px; padding: 9px 14px; }
    .send-btn { width: 38px; height: 38px; }
    .r-table table { font-size: 12px; }
    .r-table th, .r-table td { padding: 6px 4px; }
    .status-pill { font-size: 11px; padding: 4px 8px; }
    .reload-btn { font-size: 11px; padding: 4px 8px; }
    .r-summary-item { font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🚗</div>
    <div>
      <div class="brand-name">Super Sac Auto</div>
      <div class="brand-sub">Assistente de Serviços</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="status-pill" id="status-pill">
      <span class="status-dot"></span>
      <span id="status-text">Carregando...</span>
    </div>
    <button class="reload-btn" onclick="loadSheet()">↻ Atualizar</button>
  </div>
</header>

<main>
  <div class="pills" id="pills" style="display:none;">
    <span class="pill" onclick="askQuick('Trocou óleo?')">🔧 Troca de óleo</span>
    <span class="pill" onclick="askQuick('Foi feito alinhamento?')">⚙️ Alinhamento</span>
    <span class="pill" onclick="askQuick('Liste todos os serviços realizados.')">📋 Histórico completo</span>
    <span class="pill" onclick="askQuick('Esse carro está vendido?')">🏷️ Status de venda</span>
    <span class="pill" onclick="askQuick('Qual o total gasto nesse carro?')">💰 Total gasto</span>
    <span class="pill" onclick="askQuick('Quais carros ainda não foram vendidos?')">🚗 Estoque atual</span>
  </div>

  <div class="chat-box">
    <div class="messages" id="messages">
      <div class="msg assistant">
        <div class="avatar">SS</div>
        <div class="bubble">Olá! Conectando com a planilha...</div>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Ex: 2019 Ford Fusion — já trocou óleo?" onkeydown="if(event.key==='Enter')sendMsg()" disabled />
      <button class="send-btn" onclick="sendMsg()" id="send-btn" disabled>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</main>

<script>
const SHEET_ID = '1bswz7z_M-BRZGZmBYIJ3jH7MsvTuHon0KjdUtAxMows';
const API_KEY  = 'AIzaSyC5I0b5DrsdB170SG8C8Uf-ly6ZP6qTB9k';
const RANGE      = 'Flows Cars!A4:L5000';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbylFHS5geVz01G-QY1GyMFRomqgs8mO_Pht0Lg_gq9TeuB7xpqGli2F1a0vfLRgY0d6/exec';

let sheetData = [];
let connected = false;
let lastCar = null; // { vin6, car, records }

function setStatus(text, type) {
  const pill = document.getElementById('status-pill');
  const label = document.getElementById('status-text');
  label.textContent = text;
  pill.className = 'status-pill' + (type ? ' ' + type : '');
}

async function loadSheet() {
  setStatus('Carregando...', '');
  connected = false;
  document.getElementById('user-input').disabled = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'HTTP ' + res.status);
    }
    const json = await res.json();
    const rows = json.values;
    if (!rows || rows.length < 2) throw new Error('Planilha sem dados');

    const headers = rows[0];
    sheetData = rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] || ''; });
      return obj;
    });

    connected = true;
    setStatus(`${sheetData.length} registros — ao vivo`, 'ok');
    document.getElementById('pills').style.display = 'flex';
    document.getElementById('user-input').disabled = false;
    document.getElementById('send-btn').disabled = false;

    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    addMsg('assistant', `Planilha carregada com <strong>${sheetData.length} registros</strong>! Pergunte sobre qualquer carro pelo VIN ou nome.<br><br>Exemplos:<br>— <em>"2021 Mazda CX-3 — já trocou óleo?"</em><br>— <em>"JM1DKDB72M1505132 — quais serviços foram feitos?"</em><br>— <em>"Quais carros ainda não foram vendidos?"</em>`);
  } catch(e) {
    setStatus('Erro ao carregar', 'err');
    addMsg('assistant', `❌ Erro ao conectar com a planilha: <strong>${e.message}</strong><br>Clique em "↻ Atualizar" para tentar novamente.`);
    console.error(e);
  }
}

function askQuick(q) {
  document.getElementById('user-input').value = q;
  sendMsg();
}

async function sendMsg() {
  if (!connected) return;
  const input = document.getElementById('user-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';

  addMsg('user', q);
  const typingId = addTyping();
  document.getElementById('send-btn').disabled = true;
  input.disabled = true;

  try {
    // BUSCA: detecta se é VIN ou ano/modelo
    let filtered = [];
    const qClean = q.replace(/[^A-Z0-9 ]/gi, ' ').trim();
    let newCarFound = false;
    let vin6Found = null;

    // 1. VIN completo (17 chars) → extrai últimos 6
    const fullVinMatch = q.match(/\b([A-HJ-NPR-Z0-9]{17})\b/i);
    if (fullVinMatch) {
      vin6Found = fullVinMatch[1].slice(-6).toUpperCase();
    }

    // 2. Últimos 6 dígitos direto
    if (!vin6Found) {
      const last6Match = q.match(/\b([A-Z0-9]{6})\b/gi) || [];
      for (const t of last6Match) {
        // confirma que existe na planilha
        const term = t.toUpperCase();
        const found = sheetData.filter(r => (r['VIN'] || '').toUpperCase().endsWith(term));
        if (found.length) { vin6Found = term; break; }
      }
    }

    // SE ACHOU VIN → usa Apps Script (Expense Report) rápido
    if (vin6Found) {
      try {
        const scriptRes = await fetch(SCRIPT_URL + '?vin=' + vin6Found);
        const scriptData = await scriptRes.json();
        filtered = scriptData.rows || [];
        if (filtered.length) {
          newCarFound = true;
          lastCar = { vin6: vin6Found, car: (filtered[0]['CAR'] || filtered[0][Object.keys(filtered[0])[1]] || ''), records: filtered };
        }
      } catch(e) {
        console.error('Script fetch error:', e);
      }
    }

    // 3. Ano + modelo → usa Flows Cars
    if (!filtered.length && !vin6Found) {
      const stopwords = new Set(['QUAIS','FORAM','FEITO','FEITOS','SERVICO','SERVICOS','HISTORICO','COMPLETO','TROCOU','OLEO','ALINHOU','ALINHAMENTO','FEZ','TEM','JA','NAO','ESSE','CARRO','LISTA','TODO','TODOS','QUAL','TEVE','PARA','QUE','FOI']);
      const words = qClean.toUpperCase().split(/\s+/).filter(w => w.length >= 3 && !stopwords.has(w));
      if (words.length) {
        const byCar = sheetData.filter(r => words.every(w => (r['CAR'] || '').toUpperCase().includes(w)));
        if (byCar.length) {
          const uniqueVins = [...new Set(byCar.map(r => (r['VIN'] || '').slice(-6)))];
          if (uniqueVins.length > 1) {
            const cars = uniqueVins.map(v => {
              const row = byCar.find(r => (r['VIN'] || '').endsWith(v));
              return row ? row['CAR'] + ' — VIN ···' + v : v;
            });
            removeTyping(typingId);
            addMsg('assistant', '<strong>Encontrei mais de um carro:</strong><br><br>' + cars.map(c => '· ' + c).join('<br>') + '<br><br>Qual deles? Informe os 6 últimos dígitos do VIN.');
            document.getElementById('send-btn').disabled = false;
            document.getElementById('user-input').disabled = false;
            document.getElementById('user-input').focus();
            return;
          }
          filtered = byCar;
          newCarFound = true;
          const first = filtered[0];
          lastCar = { vin6: (first['VIN'] || '').slice(-6), car: first['CAR'] || '', records: filtered };
        }
      }
    }

    // 4. Sem identificador novo — usa último carro consultado (contexto)
    if (!filtered.length && lastCar) {
      filtered = lastCar.records;
    }

    // 5. Sem resultado nenhum
    if (!filtered.length) {
      removeTyping(typingId);
      addMsg('assistant', 'Não encontrei nenhum carro. Informe o VIN completo, os 6 últimos dígitos ou o ano/modelo.');
      document.getElementById('send-btn').disabled = false;
      document.getElementById('user-input').disabled = false;
      document.getElementById('user-input').focus();
      return;
    }
    const sample = JSON.stringify(filtered);
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": ["sk-ant-api03-clr5r","Q_x4u-4upgh89WgTlH","ABE9nL0dF022xDTplj","dqgIif4GxaO0d3rWu7","i17mOMqXOclNZeqKlE","AJZPYJSEA-ROU7pwAA"].join(""),
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 8000,
        system: `Carro em contexto atual: ${lastCar ? lastCar.car + ' (VIN ···' + lastCar.vin6 + ')' : 'nenhum'}\n\nVocê é o assistente interno da Super Sac Auto, uma revenda de carros usados em Carmichael, CA.
Você tem acesso à planilha de serviços e despesas dos veículos.

Colunas da planilha:
- VIN: número de identificação do veículo. O VIN completo é lançado na entrada do carro, mas os lançamentos de serviço usam apenas os últimos 6 dígitos. Ao buscar por VIN, sempre compare os últimos 6 dígitos.
- CAR: ano, marca e modelo do veículo
- CREDITOR: fornecedor ou prestador de serviço
- CATEGORY: categoria geral da despesa (ex: RECON, BODY SHOP, SMOG, SAFETY)
- SUB GROUP: o que foi feito ou comprado — CAMPO MAIS IMPORTANTE. Ex: "Oil Change", "Wheel Alignment", "Brake Pads", "Tires", "Smog Check".
- INVOICE: número da nota ou referência
- PAYMENT DATE: data do serviço ou pagamento
- SMOG DATE: data do smog check
- SAFETY DATE: data da inspeção de segurança
- PRICE: valor pago
- PAYMENT METHOD: forma de pagamento
- SOLD: se o carro foi vendido

REGRAS DE FORMATO — siga rigorosamente:

1. PERGUNTA ESPECÍFICA (ex: "já trocou óleo?", "tem alinhamento?", "fez smog?"):
Para identificar o serviço, analise CATEGORY e SUB GROUP juntos:
- Óleo: SUB GROUP contém OIL, LUBE, FILTER, SYN, SYNTHETIC ou similar
- Alinhamento: SUB GROUP contém ALIGN, WHEEL, CAMBER ou similar
- Freio: SUB GROUP contém BRAKE, PAD, ROTOR ou similar
Responda SOMENTE com este HTML:
<div class="r-specific">
<div class="r-yn yes">✓ Sim — [descreva claramente o serviço, ex: "Troca de óleo — FULL SYN + FILTER"]</div>
<div class="r-detail">[PAYMENT DATE] · [PRICE] · [CREDITOR]</div>
</div>
Se não encontrado: <div class="r-specific"><div class="r-yn no">✗ Não encontrado</div></div>
Se houver múltiplas ocorrências, repita r-detail para cada uma.

1b. PERGUNTA SOBRE SMOG (ex: "fez smog?", "quando vence o smog?"):
Busque todos os registros do VIN que tenham SMOG DATE (coluna H) preenchido.
A data de vencimento do smog = SMOG DATE + 2 anos. Calcule isso para cada ocorrência.
Responda SOMENTE com este HTML:
<div class="r-specific">
<div class="r-yn yes">✓ Smog realizado</div>
[para cada ocorrência, do mais antigo ao mais recente:]
<div class="r-detail">Realizado: [PAYMENT DATE] · Data smog: [SMOG DATE] · Vence: [SMOG DATE + 2 anos] · [CREDITOR]</div>
[na ocorrência com vencimento mais futuro, use classe destacada:]
<div class="r-detail r-highlight">⭐ Vigente — Realizado: [PAYMENT DATE] · Data smog: [SMOG DATE] · Vence: [SMOG DATE + 2 anos] · [CREDITOR]</div>
</div>
Se nenhum SMOG DATE encontrado: <div class="r-specific"><div class="r-yn no">✗ Smog não encontrado</div></div>

1c. PERGUNTA SOBRE SAFETY (ex: "fez safety?", "quando vence o safety?"):
Busque todos os registros do VIN que tenham SAFETY DATE (coluna I) preenchido.

function addMsg(role, html) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const label = role === 'assistant' ? 'SS' : 'Vc';
  div.innerHTML = `<div class="avatar">${label}</div><div class="bubble">${html}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

let tc = 0;
function addTyping() {
  const id = ++tc;
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = `t-${id}`;
  div.innerHTML = `<div class="avatar">SS</div><div class="bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(`t-${id}`);
  if (el) el.remove();
}
